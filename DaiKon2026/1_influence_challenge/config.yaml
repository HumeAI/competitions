data:
  data_root: ../../data
  labels_file: ../../data/labels_influence/daikon_influence_labels_public.csv
  modality: audio
  num_workers: 4

model:
  hidden_dim: 256
  dropout: 0.2
  num_emotions: 10

training:
  batch_size: 128
  lr: 5.0e-4
  weight_decay: 1.0e-4
  max_epochs: 50
  early_stopping_patience: 7

output:
  run_dir: ./runs/influence_baseline
